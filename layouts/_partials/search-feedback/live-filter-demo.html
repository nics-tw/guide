<div class="search-feedback-demo" data-live-filter-demo>

  {{/* 即時篩選輸入欄位 */}}
  <div class="search-feedback-demo__input-group">
    <label for="sf-filter-input" class="search-feedback-demo__label">
      即時篩選
    </label>
    <span id="sf-filter-hint" class="visually-hidden">結果將隨您輸入即時更新</span>
    <input
      type="search"
      id="sf-filter-input"
      class="search-feedback-demo__input"
      placeholder="輸入關鍵字即時篩選"
      autocomplete="off"
      aria-describedby="sf-filter-hint"
      data-live-filter-input
    >
  </div>

  {{/* Search Feedback 元件核心：status region 必須在頁面載入時就存在，初始為空 */}}
  <div
    role="status"
    aria-atomic="true"
    class="search-feedback__status"
    id="js-search-status-filter"
    data-live-filter-status
  ></div>

  {{/* Assertive live region：無結果時立即通知（polite 不夠及時） */}}
  <div
    role="alert"
    aria-atomic="true"
    class="search-feedback__status"
    id="js-search-alert-filter"
    data-live-filter-alert
  ></div>

  {{/* 可篩選清單 */}}
  <ul
    class="search-feedback-demo__results search-feedback-demo__results--filter"
    aria-label="篩選結果"
    data-live-filter-list
  >
    <li class="search-feedback-demo__result-item" data-filter-text="台灣設計指引">台灣設計指引</li>
    <li class="search-feedback-demo__result-item" data-filter-text="無障礙網頁設計">無障礙網頁設計</li>
    <li class="search-feedback-demo__result-item" data-filter-text="鍵盤操作規範">鍵盤操作規範</li>
    <li class="search-feedback-demo__result-item" data-filter-text="螢幕閱讀器支援">螢幕閱讀器支援</li>
    <li class="search-feedback-demo__result-item" data-filter-text="色彩對比標準">色彩對比標準</li>
    <li class="search-feedback-demo__result-item" data-filter-text="ARIA 角色與屬性">ARIA 角色與屬性</li>
    <li class="search-feedback-demo__result-item" data-filter-text="表單驗證設計">表單驗證設計</li>
    <li class="search-feedback-demo__result-item" data-filter-text="焦點管理策略">焦點管理策略</li>
  </ul>

  {{/* 無 JS 說明 */}}
  <noscript>
    <p class="search-feedback-demo__noscript">需要啟用 JavaScript 才能使用即時篩選功能。</p>
  </noscript>

</div>
