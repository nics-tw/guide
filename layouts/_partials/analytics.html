<!-- Google tag (gtag.js) -->
{{- if and hugo.IsProduction .Site.Params.google_analytics }}
<script
  async
  src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.google_analytics }}"
></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() {
    dataLayer.push(arguments);
  }
  gtag("js", new Date());
  gtag("config", "{{ .Site.Params.google_analytics }}");
</script>
{{- end }}
