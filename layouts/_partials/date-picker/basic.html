<!-- Date Picker 元件
     降級策略：
       - 無 JS：顯示 <input type="date">，瀏覽器提供原生 date picker
       - 觸控裝置（pointer: coarse）：JS 不增強，維持原生 <input type="date">
       - 桌面 + JS：增強為 combobox + dialog + grid 模式
-->
<div class="dp__wrapper" data-date-picker>
  <p id="dp-hint" class="dp__hint">
    請輸入日期（格式：YYYY-MM-DD），或按下日曆按鈕以月曆選取。
    月曆開啟後可用方向鍵移動日期、Enter 或空白鍵確認選取、ESC 關閉、
    Page Up／Page Down 切換上下月、Home／End 移至當週第一或最後一天。
  </p>
  <div class="dp">
    <label class="dp__label" for="dp-input">選擇日期</label>
    <div class="dp__input-group">
      <input
        type="date"
        id="dp-input"
        name="date"
        class="dp__input dp__input--native"
        aria-describedby="dp-hint"
      />

      <!--
        JS 增強後插入的 text input（combobox 模式）
        由 JS 動態建立並插入，初始不存在於 HTML
        JS 會加上以下屬性：
          role="combobox"
          aria-haspopup="grid"
          aria-expanded="false"
          aria-controls="dp-grid"
          aria-autocomplete="none"
          aria-describedby="dp-hint"
          placeholder="YYYY-MM-DD"
      -->
      <button
        type="button"
        class="dp__button"
        aria-label="開啟月曆"
        aria-expanded="false"
        aria-controls="dp-dialog"
        hidden
      >
        <svg aria-hidden="true" focusable="false" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 4h-1V2h-2v2H8V2H6v2H5C3.89 4 3 4.9 3 6v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zM7 11h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/>
        </svg>
      </button>
    </div>
    <div
      id="dp-dialog"
      class="dp__dialog"
      role="dialog"
      aria-modal="true"
      aria-label="選擇日期"
      hidden
    >
      <div class="dp__nav">
        <button type="button" class="dp__nav-btn dp__nav-btn--prev" aria-label="上個月">
          <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
          </svg>
        </button>

        <!--
          月份標題：visible text 供視覺使用，內部 span 作為 live region
          （heading 本身作為 aria-live 在部分 AT 不觸發，故另設子 span）
        -->
        <h2
          class="dp__month-heading"
          id="dp-month-label"
        >
          <span class="dp__month-live" aria-live="polite" aria-atomic="true"></span>
        </h2>
        <button type="button" class="dp__nav-btn dp__nav-btn--next" aria-label="下個月">
          <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
          </svg>
        </button>
      </div>
      <table
        role="grid"
        id="dp-grid"
        class="dp__grid"
        aria-labelledby="dp-month-label"
      >
        <thead>
          <tr>
            <th scope="col" aria-label="星期日">日</th>
            <th scope="col" aria-label="星期一">一</th>
            <th scope="col" aria-label="星期二">二</th>
            <th scope="col" aria-label="星期三">三</th>
            <th scope="col" aria-label="星期四">四</th>
            <th scope="col" aria-label="星期五">五</th>
            <th scope="col" aria-label="星期六">六</th>
          </tr>
        </thead>
        <tbody>
          <!--
            由 JS renderCalendar() 動態產生，每列結構如下：
            <tr>
              <td
                class="dp__cell"
                tabindex="-1"
                data-date="2026-03-01"
                aria-label="2026年3月1日"
              >1</td>
              ...
            </tr>

            結構說明：
            - <td> 在 <table role="grid"> 下隱含 role="gridcell"，不需顯式宣告
            - gridcell 本身可聚焦（非包裹 <button>），符合 W3C APG Date Picker Dialog 範例
            - 此結構確保 NVDA 在 role="grid" 下自動切換至 Focus mode，方向鍵事件正確傳遞

            狀態標記（JS 動態加上）：
            - 今天：<td aria-current="date" class="dp__cell dp__cell--today">
            - 已選取：<td aria-selected="true" class="dp__cell dp__cell--selected">
            - 不可選（min/max 超出）：<td aria-disabled="true" tabindex="-1" class="dp__cell dp__cell--disabled">
            - 當前焦點：tabindex="0"（roving tabindex，同時只有一個 gridcell 為 0）
            - 非本月：class="dp__cell dp__cell--other-month"
          -->
        </tbody>
      </table>
      <div class="dp__actions">
        <button type="button" class="dp__close-btn">關閉</button>
      </div>
    </div>
    <output
      class="dp__feedback"
      aria-live="polite"
      aria-atomic="true"
    ></output>
  </div>
</div>
