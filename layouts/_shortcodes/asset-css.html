{{- $src := .Get 0 -}}
{{- if (hasPrefix $src "assets/") -}}
  {{- $src = strings.TrimPrefix "assets/" $src -}}
{{- end -}}
{{- $res := resources.Get $src -}}
{{- if $res -}}
  <link rel="stylesheet" href="{{ $res.RelPermalink }}" />
{{- else -}}
  <link rel="stylesheet" href="{{ $src | relURL }}" />
{{- end -}}
